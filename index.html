<head>

  <title>BULYO256 | Bboy Kampala</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      color: #fff; font-family: Arial, sans-serif; min-height: 100vh;
    }
    nav {
      background: rgba(0,0,0,0.8); padding: 15px 20px; 
      position: sticky; top: 0; backdrop-filter: blur(10px);
      border-bottom: 1px solid #FF4D00;
    }
    nav a {
      color: #ccc; text-decoration: none; margin: 0 15px; 
      font-weight: 600; transition: color 0.3s;

    .logo { color: #FF4D00; font-weight: 900; font-size: 1.3em; }
    .container {
      max-width: 700px; margin: 0 auto; padding: 60px 20px; 
      text-align: center; animation: fadeIn 1s;
    }
    @keyframes fadeIn { from{opacity:0; transform:translateY(20px)} to{opacity:1; transform:translateY(0)} }
    h1 { font-size: 3.5em; color: #FF4D00; text-shadow: 0 0 20px rgba(255,77,0,0.5); margin-bottom: 15px; }
    .tagline { font-size: 1.3em; color: #ccc; margin-bottom: 40px; }
    .btn {
      display: inline-block; background: #FF4D00; color: #fff; 
      padding: 15px 35px; text-decoration: none; border-radius: 50px; 
      font-weight: 700; font-size: 1.2em; margin: 10px; 
      transition: all 0.3s; box-shadow: 0 4px 15px rgba(255,77,0,0.4);
    }
    .btn:hover { background: #ff6a00; transform: translateY(-3px); }
    .footer { margin-top: 80px; font-size: 0.9em; color: #666; }
    @media (max-width: 600px) { h1{font-size:2.5em} nav a{margin:0 8px; font-size:0.9em} }

</head>
<body>

  </nav>
  
  <div class="container">

    <a class="btn" href="book.html">Book Me Now</a>
    <a class="btn" style="background:transparent; border:2px solid #FF4D00;" href="about.html">My Story</a>
